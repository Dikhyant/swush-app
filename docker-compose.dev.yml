version: '3.8'

services:
  chopsticks:
    build:
      context: ./packages/chopsticks
      dockerfile: Dockerfile
    command: >
      sh -c "
      npx @acala-network/chopsticks@latest --config=/configs/polkadot_asset_hub.yml &
      npx @acala-network/chopsticks@latest --config=/configs/hydration.yml &
      wait
      "
    healthcheck:
      test: >
        CMD-SHELL
        timeout 5 bash -c '</dev/tcp/localhost/3421' &&
        timeout 5 bash -c '</dev/tcp/localhost/3422'
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      - ./packages/chopsticks/config:/configs
    ports:
      - "3421:3421"  # Asset Hub
      - "3422:3422"  # Hydration
    environment:
      - POLKADOT_ASSET_HUB_BLOCK_NUMBER=
      - HYDRADX_BLOCK_NUMBER= 